<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pulse</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="login-screen" style="display:flex; position:fixed; inset:0; background:#0c0c0d; z-index:200; align-items:center; justify-content:center;">
    <div style="background:var(--surface); border:1px solid rgba(255,255,255,0.08); border-radius:12px; padding:36px; width:360px;">
      <h2 style="font-size:16px; font-weight:700; margin-bottom:4px;">Pulse</h2>
      <p style="font-size:11px; color:#666; margin-bottom:24px;">by Leev</p>
      <label style="font-size:10px; color:#666; display:block; margin-bottom:6px;">EMAIL</label>
      <input id="login-email" type="email" style="width:100%; background:#1a1a1d; border:1px solid rgba(255,255,255,0.08); border-radius:6px; padding:8px 12px; color:#e8e8e6; font-size:13px; margin-bottom:16px;">
      <label style="font-size:10px; color:#666; display:block; margin-bottom:6px;">SENHA</label>
      <input id="login-password" type="password" style="width:100%; background:#1a1a1d; border:1px solid rgba(255,255,255,0.08); border-radius:6px; padding:8px 12px; color:#e8e8e6; font-size:13px; margin-bottom:24px;">
      <button onclick="doLogin()" style="width:100%; font-size:12px; padding:10px; border-radius:6px; border:none; background:#00e5a0; color:#0c0c0d; cursor:pointer; font-weight:500;">entrar</button>
      <p id="login-error" style="font-size:11px; color:#ff4d4d; margin-top:12px; display:none;"></p>
    </div>
  </div>

  <div id="action-panel" style="position:fixed; right:0; top:0; bottom:0; width:180px; background:var(--surface); border-left:1px solid rgba(255,255,255,0.06); padding:24px 16px; display:none; flex-direction:column; gap:8px; z-index:50;">
      <div style="font-size:10px; color:#666; letter-spacing:0.08em; text-transform:uppercase; margin-bottom:8px;">ações</div>
      <div id="action-buttons"></div>
    </div>
  <div id="app" style="display:none; margin-right:196px;">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
      <div style="display:flex; align-items:center; gap:12px;">
        <img src="https://i.ibb.co/tMpRCVB9/Ativo-9-Elemento2.png" style="height:28px;">
        <h1>Pulse - ocorrências</h1>
      </div>
      <div style="display:flex; align-items:center; gap:16px;">
        <span id="user-email" style="font-size:11px; color:#666;"></span>
        <a href="kpis2.html" style="font-size:11px; color:#666; text-decoration:none; padding:6px 12px; border:1px solid rgba(255,255,255,0.1); border-radius:6px;">KPIs</a>
        <button onclick="doLogout()" style="font-size:11px; padding:6px 12px; border-radius:6px; border:1px solid rgba(255,255,255,0.1); background:transparent; color:#666; cursor:pointer;">sair</button>
      </div>
    </div>

    <div id="tabs-bar" style="display:flex; gap:4px; margin-bottom:24px; border-bottom:1px solid rgba(255,255,255,0.06); padding-bottom:0;"></div>
    

    <div id="modal-overlay" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:100; align-items:center; justify-content:center;">
      <div style="background:var(--surface); border:1px solid rgba(255,255,255,0.1); border-radius:12px; padding:28px; width:480px; max-height:80vh; overflow-y:auto;">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
          <h2 id="modal-title" style="font-size:15px; font-weight:700;"></h2>
          <span onclick="closeModal()" style="cursor:pointer; font-size:18px; color:#666; line-height:1;">×</span>
        </div>
        <div id="modal-fields"></div>
        <div style="display:flex; gap:8px; margin-top:24px; justify-content:flex-end;">
          <button onclick="closeModal()" style="font-size:11px; padding:8px 16px; border-radius:6px; border:1px solid rgba(255,255,255,0.1); background:transparent; color:#666; cursor:pointer;">cancelar</button>
          <button onclick="submitForm()" style="font-size:11px; padding:8px 16px; border-radius:6px; border:none; background:#00e5a0; color:#0c0c0d; cursor:pointer; font-weight:500;">registrar</button>
        </div>
      </div>
    </div>

    <table>
      <thead id="thead"></thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>
  <script src="js/components/dropdown.js"></script>
  <script src="js/pulse.js"></script>
</body>
</html>
